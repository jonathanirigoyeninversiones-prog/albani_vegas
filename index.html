<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R11 eserva de Citas - Uñas Albani Vega</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #d4a373;
            --primary-hover: #bc8a5f;
            --bg-gradient: linear-gradient(135deg, #fdfbf7 0%, #f4ebd0 100%);
            --card-bg: #ffffff;
            --text-main: #2b2b2b;
            --text-muted: #666666;
            --border-color: #e5ded5;
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.06);
            padding: 35px 30px;
        }

        /* Estilo y aseguramiento del Logo */
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-container img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(212, 163, 115, 0.25);
            border: 2px solid #fff;
            display: inline-block;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            color: var(--text-main);
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }

        /* Campos y formulario con diseño moderno pero IDs originales intactos */
        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: block;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.95rem;
            background-color: #faf9f6;
            color: var(--text-main);
            transition: all 0.25s ease;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary-color);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(212, 163, 115, 0.12);
        }

        button[type="submit"], .btn-primary {
            background-color: var(--primary-color);
            color: #ffffff;
            font-weight: 600;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(212, 163, 115, 0.3);
            width: 100%;
        }

        button[type="submit"]:hover {
            background-color: var(--primary-hover);
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="image_27dfc1.jpg" alt="Uñas Albani Vega Logo" onerror="this.style.display='none'">
        </div>

        <h1>Reserva tu cita</h1>

        <div id="form-container">
            <form id="reservaForm">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" required placeholder="Tu nombre">
                </div>
                
                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" required placeholder="Tu apellido">
                </div>

                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" required placeholder="Tu número de teléfono">
                </div>

                <div class="form-group">
                    <label for="servicio">Servicio</label>
                    <select id="servicio" required>
                        <option value="" disabled selected>Selecciona un servicio</option>
                    </select>
                </div>

                <button type="submit" id="btnEnviar">Solicitar Cita</button>
            </form>
        </div>
    </div>

</body>
</html>
