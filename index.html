<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>111 Reserva de Citas - Uñas Albani Vega</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #d4a373;
            --primary-dark: #bc8a5f;
            --accent-pink: #fdf0ed;
            --text-main: #2b2b2b;
            --text-muted: #6c757d;
            --bg-body: #f9f6f0;
            --white: #ffffff;
            --border-color: #e5dfd5;
            --radius: 12px;
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--white);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .brand-header h1 {
            font-size: 1.5rem;
            color: var(--text-main);
            font-weight: 700;
            margin-bottom: 5px;
        }

        .brand-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Estilos de formulario originales conservados y estilizados */
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            color: var(--text-main);
            background-color: var(--white);
            transition: var(--transition);
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(212, 163, 115, 0.15);
        }

        button[type="submit"], .btn-main {
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
            text-align: center;
        }

        button[type="submit"]:hover, .btn-main:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
        }

        /* Tarjeta / Alerta de éxito mejorada visualmente pero funcionalmente igual */
        .success-alert {
            display: none; /* Controlado por la lógica original */
            background-color: var(--accent-pink);
            border: 1px solid #f5c6cb;
            padding: 20px;
            border-radius: var(--radius);
            text-align: center;
            margin-top: 20px;
        }

        .success-alert h3 {
            color: var(--text-main);
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .success-alert p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand-header">
            <h1>Uñas Albani Vega</h1>
            <p>Reserva tu cita de forma rápida y sencilla</p>
        </div>

        <div id="reservation-container">
            <form id="appointmentForm">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" required placeholder="Tu nombre">
                </div>
                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" required placeholder="Tu apellido">
                </div>
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" required placeholder="0414-0000000">
                </div>
                <div class="form-group">
                    <label for="servicio">Servicio</label>
                    <select id="servicio" required>
                        <option value="">Selecciona un servicio</option>
                        </select>
                </div>
                <div class="form-group">
                    <label for="condicion">Condición / Observación</label>
                    <input type="text" id="condicion" placeholder="Ej: Uñas naturales, retirado previo...">
                </div>

                <button type="submit">Solicitar Cita</button>
            </form>
        </div>

        <div id="successMessage" class="success-alert">
            <h3>¡Gracias por preferirnos! ✨</h3>
            <p>En poco te contactaremos para confirmar la cita.</p>
            <button class="btn-main" onclick="resetForm()">Aceptar</button>
        </div>
    </div>

    <footer>
        &copy; 2026 Uñas Albani Vega. Todos los derechos reservados.
    </footer>

    <script>
        // Espacio para tu lógica original intacta.
        function resetForm() {
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('reservation-container').style.display = 'block';
            document.getElementById('appointmentForm').reset();
        }
    </script>
</body>
</html>
